<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>ChakrasPlayer Remote</title>
<link rel="icon" type="image/png" href="app_icon.png"/>
<style>
  /* ── Reset & Base ────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #0d0d0d;
    --surface:   rgba(255,255,255,0.06);
    --border:    rgba(255,255,255,0.10);
    --accent:    #5865f2;
    --text:      #e0e0e0;
    --muted:     #888;
    --radius:    16px;
  }
  html, body {
    height: 100%; width: 100%; overflow: hidden;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    user-select: none; -webkit-user-select: none;
  }

  /* ── Layout ──────────────────────────────────────── */
  #app {
    display: flex; flex-direction: column;
    height: 100dvh; width: 100%;
    max-width: 480px; margin: 0 auto;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }

  /* ── Dynamic background blur ─────────────────────── */
  #bg-blur {
    position: fixed; inset: 0; z-index: -1;
    background-size: cover; background-position: center;
    filter: blur(60px) saturate(180%) brightness(0.3);
    transform: scale(1.15);
    transition: background-image 1s ease;
  }

  /* ── Cover Art ───────────────────────────────────── */
  #cover-wrap {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center;
    padding: 24px 32px 16px;
  }
  #cover {
    width: min(260px, 70vw); height: min(260px, 70vw);
    border-radius: 20px;
    object-fit: cover;
    box-shadow: 0 24px 60px rgba(0,0,0,0.7);
    transition: all 0.4s cubic-bezier(0.25,1,0.5,1);
    background: #1a1a2e;
  }
  #cover.playing { transform: scale(1.04); }

  /* ── Track Info ──────────────────────────────────── */
  #track-info {
    padding: 0 28px 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  #track-text { min-width: 0; flex: 1; }
  #title {
    font-size: 1.25rem; font-weight: 800;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    color: #fff;
  }
  #artist { font-size: 0.9rem; color: var(--muted); margin-top: 2px; }
  #btn-heart {
    background: none; border: none; cursor: pointer;
    font-size: 1.4rem; color: var(--muted);
    transition: all 0.2s; padding: 8px; border-radius: 50%;
    -webkit-tap-highlight-color: transparent;
  }
  #btn-heart.active { color: #ed4245; transform: scale(1.15); }

  /* ── Progress Bar ────────────────────────────────── */
  #progress-wrap { padding: 0 28px 4px; }
  #progress {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px; border-radius: 2px;
    background: rgba(255,255,255,0.15); outline: none; cursor: pointer;
  }
  #progress::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    margin-top: -6px;
  }
  #progress::-webkit-slider-runnable-track { height: 4px; border-radius: 2px; }
  #time-row {
    display: flex; justify-content: space-between;
    font-size: 0.7rem; color: var(--muted); margin-top: 6px;
  }

  /* ── Main Controls ───────────────────────────────── */
  #controls {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px;
  }
  .ctrl-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 1.35rem;
    padding: 12px; border-radius: 50%;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    display: flex; align-items: center; justify-content: center;
  }
  .ctrl-btn:active { transform: scale(0.88); opacity: 0.7; }
  .ctrl-btn.active { color: var(--accent); }
  #btn-play-pause {
    background: #fff; color: #111;
    width: 64px; height: 64px; border-radius: 50%;
    font-size: 1.5rem;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  #btn-play-pause:active { transform: scale(0.92); }

  /* ── Volume ──────────────────────────────────────── */
  #volume-row {
    display: flex; align-items: center; gap: 12px;
    padding: 4px 28px 20px;
  }
  #volume-row i { color: var(--muted); font-size: 0.85rem; }
  #volume {
    -webkit-appearance: none; appearance: none; flex: 1;
    height: 4px; border-radius: 2px; outline: none; cursor: pointer;
    background: rgba(255,255,255,0.15);
  }
  #volume::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px; border-radius: 50%;
    background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    margin-top: -7px;
  }

  /* ── Extra Controls Row ──────────────────────────── */
  #extra-row {
    display: flex; justify-content: space-around;
    padding: 0 12px 16px;
    border-top: 1px solid var(--border);
    margin: 0 20px; padding-top: 16px;
  }
  .extra-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 1.1rem;
    -webkit-tap-highlight-color: transparent;
    transition: color 0.2s;
    padding: 6px 12px;
  }
  .extra-btn span { font-size: 0.6rem; letter-spacing: 0.05em; text-transform: uppercase; }
  .extra-btn.active { color: var(--accent); }
  .extra-btn:active { opacity: 0.6; }

  /* ── Connection Status ───────────────────────────── */
  #status-bar {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 6px 16px;
    font-size: 0.68rem; font-weight: 700; text-align: center;
    text-transform: uppercase; letter-spacing: 0.1em;
    transition: all 0.3s;
    z-index: 100;
  }
  #status-bar.connected    { background: rgba(39,174,96,0.15); color: #27ae60; }
  #status-bar.disconnected { background: rgba(231,76,60,0.15);  color: #e74c3c; }

  /* ── Cover placeholder ───────────────────────────── */
  #cover-placeholder {
    width: min(260px, 70vw); height: min(260px, 70vw);
    border-radius: 20px; background: #1a1a2e;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.1); font-size: 4rem;
    box-shadow: 0 24px 60px rgba(0,0,0,0.7);
  }

  /* ── Seek feedback flash ─────────────────────────── */
  @keyframes seek-flash {
    0%   { opacity: 1; transform: scale(1.1); }
    100% { opacity: 0; transform: scale(0.9); }
  }
  .seek-flash { animation: seek-flash 0.4s ease-out forwards; }
</style>
<!-- FontAwesome local o CDN como fallback -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body>
<div id="bg-blur"></div>
<div id="status-bar" class="disconnected">⬤ Conectando...</div>

<div id="app">
  <!-- Cover -->
  <div id="cover-wrap">
    <div id="cover-placeholder"><i class="fa-solid fa-music"></i></div>
    <img id="cover" src="" alt="Cover" style="display:none"/>
  </div>

  <!-- Track Info -->
  <div id="track-info">
    <div id="track-text">
      <div id="title">Esperando reproducción...</div>
      <div id="artist">ChakrasPlayer</div>
    </div>
    <button class="ctrl-btn" id="btn-heart" onclick="toggleLike()">
      <i class="fa-regular fa-heart"></i>
    </button>
  </div>

  <!-- Progress -->
  <div id="progress-wrap">
    <input type="range" id="progress" min="0" max="1" value="0" step="0.001"
           oninput="onProgressInput(this.value)"
           onchange="onSeek(this.value)"/>
    <div id="time-row">
      <span id="time-cur">0:00</span>
      <span id="time-dur">0:00</span>
    </div>
  </div>

  <!-- Main Controls -->
  <div id="controls">
    <button class="ctrl-btn" id="btn-shuffle" onclick="send('shuffle')" title="Aleatorio">
      <i class="fa-solid fa-shuffle"></i>
    </button>
    <button class="ctrl-btn" onclick="send('prev')" title="Anterior">
      <i class="fa-solid fa-backward-step"></i>
    </button>
    <button class="ctrl-btn" id="btn-play-pause" onclick="send('toggle')" title="Play/Pausa">
      <i id="play-icon" class="fa-solid fa-play"></i>
    </button>
    <button class="ctrl-btn" onclick="send('next')" title="Siguiente">
      <i class="fa-solid fa-forward-step"></i>
    </button>
    <button class="ctrl-btn" id="btn-repeat" onclick="cycleRepeat()" title="Repetir">
      <i class="fa-solid fa-repeat"></i>
    </button>
  </div>

  <!-- Volume -->
  <div id="volume-row">
    <i class="fa-solid fa-volume-low"></i>
    <input type="range" id="volume" min="0" max="1" step="0.01" value="1"
           oninput="onVolumeChange(this.value)"/>
    <i class="fa-solid fa-volume-high"></i>
  </div>

  <!-- Extra Controls -->
  <div id="extra-row">
    <button class="extra-btn" onclick="send('seek', -10)" title="-10s">
      <i class="fa-solid fa-rotate-left"></i><span>-10s</span>
    </button>
    <button class="extra-btn" id="btn-mute" onclick="toggleMute()" title="Silenciar">
      <i class="fa-solid fa-volume-xmark"></i><span>Silencio</span>
    </button>
    <button class="extra-btn" onclick="send('seek', 10)" title="+10s">
      <i class="fa-solid fa-rotate-right"></i><span>+10s</span>
    </button>
  </div>
</div>

<script>
// ── Configuración ─────────────────────────────────────────────────────────────
const BASE = `${location.protocol}//${location.host}`;   // mismo host que sirvió remote.html
const POLL_MS   = 1500;   // intervalo de polling del estado
const VOL_DEBOUNCE = 300; // ms de debounce para el slider de volumen

// ── Estado local ──────────────────────────────────────────────────────────────
let state = {
    isPlaying:   false,
    title:       '',
    artist:      '',
    coverUrl:    '',
    currentTime: 0,
    duration:    1,
    volume:      1,
    isMuted:     false,
    isShuffle:   false,
    repeatMode:  'off',  // 'off' | 'all' | 'one'
    isLiked:     false
};
let dragging        = false;
let volDebounceTimer = null;
let connected       = false;

// ── DOM Refs ──────────────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const cover         = $('cover');
const coverPh       = $('cover-placeholder');
const bgBlur        = $('bg-blur');
const titleEl       = $('title');
const artistEl      = $('artist');
const progress      = $('progress');
const timeCur       = $('time-cur');
const timeDur       = $('time-dur');
const playIcon      = $('play-icon');
const btnPlayPause  = $('btn-play-pause');
const btnShuffle    = $('btn-shuffle');
const btnRepeat     = $('btn-repeat');
const btnHeart      = $('btn-heart');
const btnMute       = $('btn-mute');
const volumeSlider  = $('volume');
const statusBar     = $('status-bar');

// ── Formatear tiempo ──────────────────────────────────────────────────────────
function fmt(s) {
    if (!s || isNaN(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = String(Math.floor(s % 60)).padStart(2, '0');
    return `${m}:${sec}`;
}

// ── Enviar comando al PC ──────────────────────────────────────────────────────
async function send(command, value = null) {
    try {
        await fetch(`${BASE}/api/remote/command`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ command, value })
        });
    } catch (e) {
        setConnected(false);
    }
}

// ── Acciones de botones ───────────────────────────────────────────────────────
function onProgressInput(v) { dragging = true; timeCur.textContent = fmt(v * state.duration); }
function onSeek(v)           { dragging = false; send('seek', parseFloat(v) * state.duration); }

function onVolumeChange(v) {
    state.volume = parseFloat(v);
    clearTimeout(volDebounceTimer);
    volDebounceTimer = setTimeout(() => send('volume', state.volume), VOL_DEBOUNCE);
}

function toggleMute() {
    state.isMuted = !state.isMuted;
    send('volume', state.isMuted ? 0 : state.volume);
    btnMute.classList.toggle('active', state.isMuted);
    btnMute.querySelector('i').className = state.isMuted
        ? 'fa-solid fa-volume-xmark' : 'fa-solid fa-volume-xmark';
}

function toggleLike() {
    state.isLiked = !state.isLiked;
    btnHeart.classList.toggle('active', state.isLiked);
    btnHeart.querySelector('i').className = state.isLiked
        ? 'fa-solid fa-heart' : 'fa-regular fa-heart';
    send('like', state.isLiked);
}

let repeatModes = ['off', 'all', 'one'];
function cycleRepeat() {
    const next = repeatModes[(repeatModes.indexOf(state.repeatMode) + 1) % repeatModes.length];
    state.repeatMode = next;
    send('repeat', next);
    updateRepeatBtn();
}
function updateRepeatBtn() {
    const active = state.repeatMode !== 'off';
    btnRepeat.classList.toggle('active', active);
    const icon = btnRepeat.querySelector('i');
    icon.className = state.repeatMode === 'one'
        ? 'fa-solid fa-repeat fa-1x'
        : 'fa-solid fa-repeat';
    btnRepeat.title = { off: 'Repetir desactivado', all: 'Repetir todo', one: 'Repetir una' }[state.repeatMode];
}

// ── Actualizar UI con nuevo estado ────────────────────────────────────────────
function applyState(s) {
    // Título y artista
    if (s.title && s.title !== state.title) {
        titleEl.textContent  = s.title  || 'Sin título';
        artistEl.textContent = s.artist || 'Artista desconocido';
        document.title = s.title ? `♫ ${s.title} — Remote` : 'ChakrasPlayer Remote';
    }

    // Cover art con transición
    if (s.coverUrl && s.coverUrl !== state.coverUrl) {
        const src = s.coverUrl.startsWith('/')
            ? `${BASE}${s.coverUrl}`
            : s.coverUrl;

        if (!src.includes('gradient:')) {
            cover.style.opacity = '0';
            cover.onload = () => { cover.style.opacity = '1'; };
            cover.onerror = () => { cover.style.display = 'none'; coverPh.style.display = 'flex'; };
            cover.src = src;
            cover.style.display  = 'block';
            coverPh.style.display = 'none';
            bgBlur.style.backgroundImage = `url('${src}')`;
        }
    }
    if (!s.coverUrl) {
        cover.style.display = 'none';
        coverPh.style.display = 'flex';
    }

    // Play / Pause
    const playing = !!s.isPlaying;
    cover.classList.toggle('playing', playing);
    playIcon.className = playing ? 'fa-solid fa-pause' : 'fa-solid fa-play';

    // Progress (solo si no está arrastrando)
    if (!dragging && s.duration > 0) {
        const pct = (s.currentTime || 0) / s.duration;
        progress.value      = pct;
        progress.max        = 1;
        progress.style.background = `linear-gradient(to right,
            rgba(255,255,255,0.9) 0%,
            rgba(255,255,255,0.9) ${pct * 100}%,
            rgba(255,255,255,0.15) ${pct * 100}%,
            rgba(255,255,255,0.15) 100%)`;
        timeCur.textContent = fmt(s.currentTime || 0);
        timeDur.textContent = fmt(s.duration);
    }

    // Volumen (solo si no está en uso)
    if (document.activeElement !== volumeSlider && s.volume !== undefined) {
        volumeSlider.value = s.volume;
        volumeSlider.style.background = `linear-gradient(to right,
            rgba(255,255,255,0.9) 0%,
            rgba(255,255,255,0.9) ${s.volume * 100}%,
            rgba(255,255,255,0.15) ${s.volume * 100}%,
            rgba(255,255,255,0.15) 100%)`;
    }

    // Shuffle
    btnShuffle.classList.toggle('active', !!s.isShuffle);

    state = { ...state, ...s };
}

// ── Conexión / polling ────────────────────────────────────────────────────────
function setConnected(ok) {
    if (connected === ok) return;
    connected = ok;
    statusBar.textContent = ok ? '⬤ Conectado al PC' : '⬤ Sin conexión — reintentando...';
    statusBar.className   = ok ? 'connected' : 'disconnected';
}

async function pollState() {
    try {
        const res  = await fetch(`${BASE}/api/remote/status`, { cache: 'no-store' });
        if (!res.ok) throw new Error(res.status);
        const data = await res.json();
        setConnected(true);
        applyState(data);
    } catch (e) {
        setConnected(false);
    }
}

// ── Swipe gestures (siguiente / anterior) ────────────────────────────────────
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].clientX; }, { passive: true });
document.addEventListener('touchend',   e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 60) send(dx < 0 ? 'next' : 'prev');
}, { passive: true });

// ── Teclado (para pruebas en escritorio) ─────────────────────────────────────
document.addEventListener('keydown', e => {
    if (e.code === 'Space')       { e.preventDefault(); send('toggle'); }
    if (e.code === 'ArrowRight')  send('next');
    if (e.code === 'ArrowLeft')   send('prev');
    if (e.code === 'ArrowUp')     send('volume', Math.min(1, state.volume + 0.05));
    if (e.code === 'ArrowDown')   send('volume', Math.max(0, state.volume - 0.05));
});

// ── Inicio ────────────────────────────────────────────────────────────────────
pollState();
setInterval(pollState, POLL_MS);
</script>
</body>
</html>
