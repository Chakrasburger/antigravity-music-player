    <script>
        // Redirección Automática para Celular (Control Remoto)
        if (/Mobi|Android|iPhone/i.test(navigator.userAgent)) {
            const path = window.location.pathname;
            if (path === '/' || path.endsWith('index.html') || path === '') {
                window.location.href = '/remote';
            }
        }

        // Polyfill for indexedDB in restricted environments (WebKitGTK)
        window.indexedDB = window.indexedDB || window.webkitIndexedDB || window.mozIndexedDB || window.msIndexedDB;
        if (!window.indexedDB) {
            console.warn("IndexedDB not found on window, checking for global variable...");
            try { if (typeof indexedDB !== 'undefined') window.indexedDB = indexedDB; } catch (e) { }
        }

        // Sistema de Registro Global para Diagnóstico
        window.agLogs = [];
        const originalLog = console.log;
        const originalError = console.error;

        function appendToDebug(msg, type = 'info') {
            const consoleEl = document.getElementById('ag-debug-console');
            if (consoleEl) {
                const div = document.createElement('div');
                div.className = type === 'error' ? 'text-red-500' : 'text-green-500';
                div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
                consoleEl.appendChild(div);
                consoleEl.scrollTop = consoleEl.scrollHeight;
            }
        }

        console.log = (...args) => {
            originalLog(...args);
            appendToDebug(args.join(' '));
        };
        console.error = (...args) => {
            originalError(...args);
            appendToDebug(args.join(' '), 'error');
        };

        window.onerror = (msg, url, line, col, error) => {
            console.error(`GLOBAL ERROR: ${msg} at ${line}:${col}`);
            return false;
        };
        window.onunhandledrejection = (event) => {
            console.error(`PROMISE REJECTION: ${event.reason}`);
        };
    </script>

    <!-- Liquid Glass Optical Refraction SVG Assets -->
    <svg style="display: none;">
        <defs>
            <filter id="refraction" x="-20%" y="-20%" width="140%" height="140%">
                <!-- Base Turbulence (Frosted Glass Grain) -->
                <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" result="noise" />
                <!-- Displacement Mapping (Bending Light/Pixels) -->
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G"
                    result="displacement" />
                <!-- Highlight Specular Integration -->
                <feComposite operator="in" in="displacement" in2="SourceAlpha" result="composite" />
            </filter>
        </defs>
    </svg>
