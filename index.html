    <style>

            --color-secondary: #F2F3F5;
            --color-tertiary: #E3E5E8;
            --color-blurple: #5865F2;
            --color-text: #313338;

            --color-blurple: #5865F2;

        /* Elite Liquid Glass Base */
        .glass-panel {
            background-color: color-mix(in srgb, var(--color-bg) calc(var(--glass-opacity, 70) * 1%), transparent);
            backdrop-filter: blur(var(--glass-blur, 30px)) saturate(var(--glass-saturate, 210%));
            -webkit-backdrop-filter: blur(var(--glass-blur, 30px)) saturate(var(--glass-saturate, 210%));
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            /* Hardware render acceleration for LCP */
            will-change: transform, backdrop-filter;
            transform: translateZ(0);
            position: relative;
            border-radius: 12px;
        }

        .glass-panel::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            border-radius: inherit;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.15), inset 0 0 12px rgba(255, 255, 255, 0.02);
            z-index: 50;

        [data-theme='light'] .glass-panel {
            background-color: color-mix(in srgb, var(--color-bg) 60%, transparent);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
        }

            color: var(--color-text);
            margin: 0;
            overflow: hidden;

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;

        /* Dynamic Liquid Lyrics Classes */
        .active-lyric-line {
            background: linear-gradient(to right, var(--color-blurple) var(--karaoke-fill, 0%), rgba(255, 255, 255, 0.4) var(--karaoke-fill, 0%));

        ::-webkit-scrollbar-track {

        }

        ::-webkit-scrollbar-thumb {

        }

        /* Fluid Sliders for Theme Builder */
        input[type=range].theme-slider {
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            height: 6px;
            border-radius: 10px;
            outline: none;

        input[type=range].theme-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: white;

            transition: transform 0.1s;

        }

        /* EQ Specific Slider */
        input[type=range].eq-slider {
            -webkit-appearance: none;
            appearance: none;
            height: 44px;
            /* Massive hit area for horizontal axis (since rotated -90deg) */
            background: transparent !important;
            /* Force transparent bounding box */
            outline: none;
        }

        input[type=range].eq-slider::-webkit-slider-runnable-track {
            width: 100%;
            height: 12px;
            background: rgba(0, 0, 0, 0.45) !important;
            border-radius: 6px;
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.6), 0 1px 0 rgba(255, 255, 255, 0.1);
            /* Deep carved look */
            border: 1px solid rgba(0, 0, 0, 0.5);
            /* Center the 12px track inside the 44px invisible hit area ((44-12)/2 = 16) */
            margin-top: 16px;
        }

        input[type=range].eq-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;

        @keyframes skeleton-pulse {

        input[type=range] {

        input[type=range]::-webkit-slider-thumb {

        .group:hover input[type=range]::-webkit-slider-thumb,

        input[type=range]::-webkit-slider-thumb:hover {

        input[type=range]::-webkit-slider-runnable-track {

        .progress-bar {

        .active-row {

        .table-row-hover:hover .play-icon-cell {

        }

        .table-row-hover:hover .track-num-cell {

        /* Optical Refraction Interactions */
        .glass-panel {
            /* Fallback or base */
            backdrop-filter: blur(24px) saturate(180%);
            /* Advanced SVG Displacement */
            /* Note: filter: url(#refraction) can be very GPU intensive. Applying specifically to the container. */
            position: relative;
        }

        .glass-panel::before {
            content: '';
            position: absolute;
            inset: -4px;
            z-index: -1;
            border-radius: inherit;
            filter: url(#refraction) blur(10px);
            opacity: 0.5;
            pointer-events: none;
        }

        .morphing-button {
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);

        .morphing-button:active {
            transform: scale(0.92);
            filter: url(#refraction) brightness(1.2);
            box-shadow: 0 0 15px var(--color-blurple);
        }
    </style>

<body className="bg-[#121212] font-sans selection:bg-discord-blurple selection:text-white antialiased overflow-hidden">
    <!-- Liquid Glass Optical Refraction SVG Assets -->
    <svg style="display: none;">
        <defs>
            <filter id="refraction" x="-20%" y="-20%" width="140%" height="140%">
                <!-- Base Turbulence (Frosted Glass Grain) -->
                <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" result="noise" />
                <!-- Displacement Mapping (Bending Light/Pixels) -->
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G"
                    result="displacement" />
                <!-- Highlight Specular Integration -->
                <feComposite operator="in" in="displacement" in2="SourceAlpha" result="composite" />
            </filter>
        </defs>
    </svg>

    <div id="root"></div>

    <!-- Dexie.js Setup -->
    <script>
        // --- Storage Layer ---
        const db = new Dexie('AntiGravityOfflineDB');
        db.version(1).stores({
            tracks: 'id',
            settings: 'key',
            stats: 'artist'
        });
        db.version(2).stores({
            tracks: 'id, dateAdded, playCount, rating',
            settings: 'key',
            stats: 'artist'
        }).upgrade(tx => {
            return tx.tracks.toCollection().modify(track => {
                track.dateAdded = track.dateAdded || Date.now();
                track.playCount = track.playCount || 0;
                track.rating = track.rating || 0;
            });
        });
        db.version(3).stores({
            tracks: 'id, dateAdded, playCount, rating',
            settings: 'key',
            stats: 'artist',
            custom_themes: 'id' // 'active' -> { blur, saturate, bgOpacity, primaryColor }
        });

        window.StorageApi = {
            async setSetting(key, value) {
                await db.settings.put({ key, value });
            },
            async getSetting(key) {
                const setting = await db.settings.get(key);
                return setting ? setting.value : null;
            },
            async saveFolderPath(path) {
                await db.settings.put({ key: 'folderPath', value: path });
            },
            async getFolderPath() {
                const setting = await db.settings.get('folderPath');
                return setting ? setting.value : null;
            },
            async saveTracks(tracks) {
                await db.tracks.bulkPut(tracks);
            },
            async getAllTracks() {
                return await db.tracks.toArray();
            },
            async updateTrack(id, newData) {
                const track = await db.tracks.get(id);
                if (track) {
                    const updated = { ...track, ...newData };
                    await db.tracks.put(updated);
                    return updated;
                }
                return null;
            },
            async clearTracks() {
                await db.tracks.clear();
            },
            async deleteTrack(id) {
                await db.tracks.delete(id);
            },
            async logPlay(artist, minutesAdded, trackId = null) {
                if (!artist) return;
                if (trackId) {
                    const track = await db.tracks.get(trackId);
                    if (track) {
                        await db.tracks.put({ ...track, playCount: (track.playCount || 0) + 1 });
                    }
                }
                let data = await db.stats.get(artist);
                if (!data) data = { artist, minutes: 0, playCount: 0 };
                data.minutes += minutesAdded;
                data.playCount += 1;
                await db.stats.put(data);
            },
            async rateTrack(trackId, rating) {
                const track = await db.tracks.get(trackId);
                if (track) {
                    await db.tracks.put({ ...track, rating });
                }
            },
            async getStats() {
                const items = await db.stats.toArray();
                items.sort((a, b) => b.minutes - a.minutes);
                return items;
            },
            async saveCustomTheme(themeState) {
                await db.custom_themes.put({ id: 'active', ...themeState });
            },
            async getCustomTheme() {
                return await db.custom_themes.get('active');
            }
        };

        // File Utility
        window.parseID3 = (file) => {
            return new Promise((resolve) => {
                const baseName = file.name.replace(/\.[^/.]+$/, "");
                let fallbackArtist = "Unknown Artist";
                let fallbackTitle = baseName;

                if (baseName.includes(" - ")) {
                    const parts = baseName.split(" - ");
                    fallbackArtist = parts[0].trim();
                    fallbackTitle = parts.slice(1).join(" - ").trim();
                } else if (baseName.includes("-")) {
                    const parts = baseName.split("-");
                    if (parts.length > 1) {
                        fallbackArtist = parts[0].trim();
                        fallbackTitle = parts.slice(1).join("-").trim();
                    }
                }

                window.jsmediatags.read(file, {
                    onSuccess: (tag) => {
                        let coverUrl = null;
                        if (tag.tags.picture) {
                            let base64String = "";
                            const data = tag.tags.picture.data;
                            for (let i = 0; i < data.length; i++) {
                                base64String += String.fromCharCode(data[i]);
                            }
                            coverUrl = "data:" + tag.tags.picture.format + ";base64," + window.btoa(base64String);
                        }
                        resolve({
                            title: tag.tags.title || fallbackTitle,
                            artist: tag.tags.artist || fallbackArtist,
                            album: tag.tags.album || "Unknown Album",
                            coverUrl: coverUrl
                        });
                    },
                    onError: () => {
                        resolve({
                            title: fallbackTitle,
                            artist: fallbackArtist,
                            album: "Unknown Album",
                            coverUrl: null
                        });
                    }
                });
            });
        };
    </script>

    <!-- React Application -->
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        const formatTime = (seconds) => {
            if (!seconds || isNaN(seconds) || seconds <= 0) return "--:--";
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            return `${m}:${s.toString().padStart(2, '0')}`;
        };
        const App = () => {
            const [view, setView] = useState('songs'); // 'songs', 'analytics', 'queue', 'lyrics', 'searchYt'
            const [previousView, setPreviousView] = useState('songs');
            const [library, setLibrary] = useState([]);
            const [isScanning, setIsScanning] = useState(false);
            const [permissionNeeded, setPermissionNeeded] = useState(false);
            const [savedDirHandle, setSavedDirHandle] = useState(null);
            const [savedFolderPath, setSavedFolderPath] = useState(null);
            const [librarySearchQuery, setLibrarySearchQuery] = useState('');
            const [vsScrollTop, setVsScrollTop] = useState(0); // Virtual scroll
            const ROW_HEIGHT = 56; // px per song row
            const VS_OVERSCAN = 5; // extra rows above/below viewport

            // Context Menu + Editor State
            const [contextMenu, setContextMenu] = useState(null); // { x, y, track }
            const [editMetaModal, setEditMetaModal] = useState(null); // { track, filePath }
            const [trimModal, setTrimModal] = useState(null); // { track, filePath }
            const [trimRange, setTrimRange] = useState({ start: 0, end: 0 });
            const [editorSaving, setEditorSaving] = useState(false);
            const [editorMsg, setEditorMsg] = useState('');
            const [trimPreviewPlaying, setTrimPreviewPlaying] = useState(false);
            const trimPreviewRef = useRef(new Audio());
            const [isServerConnected, setIsServerConnected] = useState(true);

            // --- Robust Audio Engine (MediaElement-based) ---
            const audioContextRef = useRef(null);
            const audioTagRef = useRef(null); // The <audio> element
            const sourceNodeRef = useRef(null);
            const analyserRef = useRef(null);
            const eqNodesRef = useRef([]);
            const gainNodeRef = useRef(null);
            const audioBufferCache = useRef(new Map()); // Now storing Blobs, not decoded buffers
            const streamIdRef = useRef(0);

            // Lightweight log helpers (no visual console)
            const addLog = useCallback((msg, type = 'info') => {
                // Silently log to browser console only
                if (type === 'error') console.error('[AG]', msg);
                else if (type === 'warn') console.warn('[AG]', msg);
                else console.log('[AG]', msg);
            }, []);


            // Heartbeat check for backend connectivity
            useEffect(() => {
                const checkStatus = async () => {
                    try {
                        const res = await fetch('/api/ping', { method: 'POST' });
                        setIsServerConnected(res.ok);
                    } catch (e) {
                        setIsServerConnected(false);
                    }
                };
                checkStatus();
                const interval = setInterval(checkStatus, 5000);
                return () => clearInterval(interval);
            }, []);

            const openContextMenu = (e, track) => {
                e.preventDefault();
                e.stopPropagation();
                setContextMenu({ x: e.clientX, y: e.clientY, track });
            };

            const closeContextMenu = () => setContextMenu(null);

            const openMetaEditor = (track) => {
                closeContextMenu();
                const filePath = track.filePath || track.handle?.name ||
                    (track.fileName ? `${BASE_DIR_HINT}/${track.fileName}` : null);
                setEditMetaModal({
                    track,
                    meta: {
                        title: track.title || '',
                        artist: track.artist || '',
                        album: track.album || '',
                        year: track.releaseYear || '',
                        genre: track.genre || ''
                    }
                });
                setEditorMsg('');
            };

            const openTrimmer = (track) => {
                closeContextMenu();
                setTrimPreviewPlaying(false);
                setEditorMsg('Cargando pista...');

                const filePath = track.filePath || track.file_path || track.fileName;
                const audioUrl = `/api/file?path=${encodeURIComponent(filePath)}`;

                const tempAudio = new Audio(audioUrl);
                tempAudio.onloadedmetadata = () => {
                    const exactDuration = tempAudio.duration;
                    setTrimRange({ start: 0, end: Math.floor(exactDuration || 60) });
                    setTrimModal({ track: { ...track, duration: exactDuration } });
                    setEditorMsg('');
                    trimPreviewRef.current.src = audioUrl;
                };
                tempAudio.onerror = () => {
                    setTrimRange({ start: 0, end: Math.floor(track.duration || 60) });
                    setTrimModal({ track });
                    setEditorMsg('Aviso: modo sin conexión. Previsualización no disponible.');
                    trimPreviewRef.current.src = '';
                };
            };

            const saveMetadata = async () => {
                if (!editMetaModal) return;
                setEditorSaving(true);
                setEditorMsg('');
                try {
                    const res = await fetch('/api/edit-metadata', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            filePath: editMetaModal.track.filePath || editMetaModal.track.fileName,
                            ...editMetaModal.meta
                        })
                    });
                    const data = await res.json();
                    if (data.status === 'success') {
                        // Sync local state
                        const updatedMeta = editMetaModal.meta;
                        setLibrary(prev => prev.map(t =>
                            t.id === editMetaModal.track.id
                                ? { ...t, title: updatedMeta.title, artist: updatedMeta.artist, album: updatedMeta.album, releaseYear: updatedMeta.year, genre: updatedMeta.genre }
                                : t
                        ));
                        await window.StorageApi.updateTrack(editMetaModal.track.id, { title: updatedMeta.title, artist: updatedMeta.artist, album: updatedMeta.album, releaseYear: updatedMeta.year, genre: updatedMeta.genre });
                        setEditorMsg('✅ Guardado con éxito');
                        setTimeout(() => setEditMetaModal(null), 1200);
                    } else {
                        setEditorMsg(`❌ Error: ${data.message}`);
                    }
                } catch (e) {
                    setEditorMsg('❌ Error: Asegúrate de que el servidor Python está corriendo.');
                } finally {
                    setEditorSaving(false);
                }
            };

            const trimAudio = async () => {
                if (!trimModal) return;
                setEditorSaving(true);
                setEditorMsg('');
                try {

                    let lastNode = sourceNodeRef.current;
                    eqNodesRef.current.forEach(node => {
                        lastNode.connect(node);
                        lastNode = node;

                    lastNode.connect(gainNodeRef.current);

                                const maxres = `https://i.ytimg.com/vi/${videoId}/maxresdefault.jpg`;
                                const hqres = `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;
                                try {
                                    const maxResCheck = await fetchWithProxyFallback(maxres);
                                    if (maxResCheck && maxResCheck.length > 1500) return maxres;
                                } catch (e) { }
                                try {
                                    const hqResCheck = await fetchWithProxyFallback(hqres);
                                    if (hqResCheck && hqResCheck.length > 1500) return hqres;
                                } catch (e) { }
                                return null;
                            };

                            // Query Formatter to avoid breaking APIs with literal "Unknown Artist" searches
                            const searchTerm = cleanArtist === "Unknown Artist" ? cleanTitle : `${cleanArtist} ${cleanTitle}`;

                            // 1. Try iTunes via JSONP
                            if (!track.coverUrl || track.album === "Unknown Album" || !track.releaseYear) {
                                setEnrichmentStep('Consultando iTunes API...');
                                const itunesUrl = `https://itunes.apple.com/search?term=${encodeURIComponent(searchTerm)}&entity=song&limit=1`;
                                try {
                                    const data = await new Promise((resolve, reject) => {
                                        const callbackName = 'itunes_cb_' + Math.floor(Math.random() * 1000000);
                                        const script = document.createElement('script');
                                        script.src = `${itunesUrl}&callback=${callbackName}`;
                                        window[callbackName] = (json) => {
                                            delete window[callbackName];
                                            if (document.body.contains(script)) document.body.removeChild(script);
                                            resolve(json);
                                        };
                                        script.onerror = () => {
                                            delete window[callbackName];
                                            if (document.body.contains(script)) document.body.removeChild(script);
                                            reject(new Error('JSONP request failed'));
                                        };
                                        document.body.appendChild(script);
                                    });

                                    if (data.results && data.results.length > 0) {
                                        const result = data.results[0];
                                        if (!track.coverUrl) track.coverUrl = result.artworkUrl100?.replace('100x100bb', '600x600bb');
                                        if (track.album === "Unknown Album" && result.collectionName) track.album = result.collectionName;
                                        if (track.artist === "Unknown Artist" && result.artistName) track.artist = result.artistName;
                                        if (!track.releaseYear && result.releaseDate) track.releaseYear = result.releaseDate.substring(0, 4);
                                        if (!track.genre) track.genre = result.primaryGenreName;
                                        enriched = true;
                                    }
                                } catch (e) {
                                    console.warn("iTunes Enrichment failed for", track.title);
                                }
                            }

                            // 1.5. Fallback Deezer API (Spotify-grade Database)
                            if (!track.coverUrl || track.album === "Unknown Album" || track.artist === "Unknown Artist") {
                                setEnrichmentStep('Buscando en base de datos Deezer...');
                                try {
                                    const deezerUrl = `https://api.deezer.com/search?q=${encodeURIComponent(searchTerm)}`;
                                    const deezerDataStr = await fetchWithProxyFallback(deezerUrl);
                                    let deezerData = null;
                                    try { deezerData = JSON.parse(deezerDataStr); } catch (e) { }

                                    if (deezerData && deezerData.data && deezerData.data.length > 0) {
                                        const hit = deezerData.data[0];
                                        if (!track.coverUrl && hit.album && hit.album.cover_xl) {
                                            track.coverUrl = hit.album.cover_xl;
                                            enriched = true;
                                        }
                                        if (track.album === "Unknown Album" && hit.album && hit.album.title) {
                                            track.album = hit.album.title;
                                            enriched = true;
                                        }
                                        if (track.artist === "Unknown Artist" && hit.artist && hit.artist.name) {
                                            track.artist = hit.artist.name;
                                            enriched = true;
                                        }
                                    }
                                } catch (e) {
                                    console.warn("Deezer API Enrichment failed");
                                }
                            }

                            // 2. Fallback Genius API
                            if (!track.coverUrl || track.album === "Unknown Album" || !track.releaseYear) {
                                setEnrichmentStep('Escaneando base Genius API...');
                                try {
                                    const geniusUrl = `https://genius.com/api/search/multi?per_page=1&q=${encodeURIComponent(searchTerm)}`;
                                    const geniusDataStr = await fetchWithProxyFallback(geniusUrl);
                                    const geniusData = JSON.parse(geniusDataStr);

                                    const songSection = geniusData?.response?.sections?.find(s => s.type === 'song');
                                    let hit = songSection?.hits?.[0]?.result;

                                    if (!hit && geniusData?.response?.sections?.length > 0) {
                                        hit = geniusData.response.sections[0].hits?.[0]?.result;
                                    }

                                    if (hit) {
                                        if (!track.coverUrl && hit.song_art_image_url) {
                                            track.coverUrl = hit.song_art_image_url;
                                            enriched = true;
                                        }
                                        if (track.album === "Unknown Album" && hit.primary_album && hit.primary_album.name) {
                                            track.album = hit.primary_album.name;
                                            enriched = true;
                                        }
                                        if (!track.releaseYear && hit.release_date_components && hit.release_date_components.year) {
                                            track.releaseYear = hit.release_date_components.year.toString();
                                            enriched = true;
                                        }
                                    }
                                } catch (e) {
                                    console.warn("Genius API Enrichment failed for", track.title);
                                }
                            }

                            // 3. Fallback YouTube Music (Official Audio Thumbnail Extraction & Deep JSON Description Scraping)
                            if (!track.coverUrl || track.album === "Unknown Album") {
                                setEnrichmentStep('Analizando YouTube / Audio Oficial...');
                                try {
                                    const ytSearchUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(searchTerm + ' Official Audio')}`;
                                    const html = await fetchWithProxyFallback(ytSearchUrl);

                                    const ytMatches = [...html.matchAll(/"videoId":"([^"]+)"/g)].map(m => m[1]);
                                    const uniqueVideos = [...new Set(ytMatches)].slice(0, 3); // Top 3 results

                                    for (const videoId of uniqueVideos) {
                                        let videoHtml = null;

                                        if (!track.coverUrl) {
                                            const validThumb = await getValidThumbnail(videoId);
                                            if (validThumb) {
                                                track.coverUrl = validThumb;
                                                enriched = true;
                                            }
                                        }

                                        if (!track.coverUrl || track.album === "Unknown Album") {
                                            const ytVideoUrl = `https://www.youtube.com/watch?v=${videoId}`;
                                            videoHtml = await fetchWithProxyFallback(ytVideoUrl);
                                        }

                                        // Sub-Fallback: Channel Avatar if cover fails
                                        if (!track.coverUrl && videoHtml) {
                                            const avatarMatch = videoHtml.match(/"avatar":\{"thumbnails":\[\{"url":"([^"]+)"/);
                                            if (avatarMatch && avatarMatch[1] && !avatarMatch[1].includes("default_avatar")) {
                                                track.coverUrl = avatarMatch[1].replace(/=s\d+-/, '=s600-');
                                                enriched = true;
                                            }
                                        }

                                        // Deep Component Parsing for Album
                                        if (track.album === "Unknown Album" && videoHtml) {
                                            const responseMatch = videoHtml.match(/var ytInitialPlayerResponse = (\{.*?\});/);
                                            if (responseMatch && responseMatch[1]) {
                                                const playerRes = JSON.parse(responseMatch[1]);
                                                const description = playerRes.microformat?.playerMicroformatRenderer?.description?.simpleText || "";
                                                const channelName = playerRes.videoDetails?.author || "";

                                                const autoGenMatch = description.match(/Provided to YouTube by.*?\n+.*?\n+.*?\n+(.*?)\n+/i);
                                                const explicitMatch = description.match(/Album:\s*([^\n]+)/i);

                                                if (autoGenMatch && autoGenMatch[1] && autoGenMatch[1].length < 100) {
                                                    track.album = autoGenMatch[1].trim();
                                                    enriched = true;
                                                } else if (explicitMatch && explicitMatch[1] && explicitMatch[1].length < 100) {
                                                    track.album = explicitMatch[1].trim();
                                                    enriched = true;
                                                } else if (channelName && description.length < 500) {
                                                    let suffixString = channelName;
                                                    if (suffixString.includes(" - Topic")) suffixString = suffixString.replace(" - Topic", "");
                                                    track.album = `${suffixString} - Single`;
                                                    enriched = true;
                                                }
                                            }
                                        }

                                        if (track.coverUrl && track.album !== "Unknown Album") break; // Found both, exit loop
                                    }
                                } catch (e) {
                                    console.warn("YouTube Enrichment failed for", track.title);
                                }
                            }

                            // 4. Final Absolute Fallback: Web Image Search (DuckDuckGo proxy)
                            if (!track.coverUrl) {
                                setEnrichmentStep('Búsqueda profunda web DuckDuckGo...');
                                try {
                                    const albumTerm = track.album !== "Unknown Album" ? track.album : "";
                                    const ddgUrl = `https://html.duckduckgo.com/html/?q=${encodeURIComponent(searchTerm + ' ' + albumTerm + ' album cover')}`;
                                    const webHtml = await fetchWithProxyFallback(ddgUrl);

                                    const imgMatch = webHtml.match(/src="\/\/external-content\.duckduckgo\.com\/iu\/\?u=([^"&]+)/);
                                    if (imgMatch && imgMatch[1]) {
                                        track.coverUrl = decodeURIComponent(imgMatch[1]);
                                        enriched = true;
                                    }
                                } catch (e) {
                                    console.warn("Web Search Content failed for", track.title);
                                }
                            }

                            // Force populate Album Name if blank
                            if (track.album === "Unknown Album") {
                                track.album = track.artist !== "Unknown Artist" ? track.artist : "Unknown";
                                enriched = true;
                            }

                            if (enriched) {
                                await window.StorageApi.updateTrack(track.id, {
                                    coverUrl: track.coverUrl,
                                    album: track.album,
                                    artist: track.artist,
                                    releaseYear: track.releaseYear,
                                    genre: track.genre
                                });

                                // Write back to file via Backend
                                try {
                                    await fetch('/api/edit-metadata', {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({
                                            filePath: track.filePath,
                                            title: track.title,
                                            artist: track.artist,
                                            album: track.album,
                                            year: track.releaseYear,
                                            genre: track.genre,
                                            coverUrl: track.coverUrl
                                        })
                                    });
                                } catch (err) {
                                    console.warn("Failed to write metadata back to file for", track.title);
                                }

                                // Batch update library to avoid scroll freezing
                                setLibrary(prev => prev.map(t => t.id === track.id ? { ...t, coverUrl: track.coverUrl, album: track.album, artist: track.artist, releaseYear: track.releaseYear, genre: track.genre } : t));
                            }
                        }
                    } catch (e) {
                        console.error("Error processing enrichment loop", e);
                    }

                    // Remove from queue and setup next
                    setEnrichmentQueue(prev => prev.slice(1));
                    setCurrentlyEnriching(null);
                    setEnrichmentStep('');

                    // Rate Limiting Delay (3 seconds)
                    timeoutId = setTimeout(() => {
                        // handled by effect dependency
                    }, 3000);
                };

                // Add a small delay for the very first item starting to not block rendering
                const immediateId = setTimeout(() => { processQueue(); }, enrichmentQueue.length > 0 && !currentlyEnriching ? 100 : 3000);

                return () => {
                    clearTimeout(timeoutId);
                    clearTimeout(immediateId);
                };
            }, [enrichmentQueue, isOnline, isScanning, library, currentlyEnriching]);

            const toggleShuffle = () => {
                if (originalQueue.length === 0) return;
                let newQueue;
                let newIndex = -1;

                if (!isShuffle) {
                    const currentTrack = playbackQueue[currentTrackIndex];
                    let remaining = [...originalQueue];
                    if (currentTrack) {
                        const currentIdxInOriginal = remaining.findIndex(t => t.id === currentTrack.id);
                        if (currentIdxInOriginal !== -1) {
                            remaining.splice(currentIdxInOriginal, 1);
                        }
                    }
                    // Fisher-Yates
                    for (let i = remaining.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [remaining[i], remaining[j]] = [remaining[j], remaining[i]];
                    }
                    newQueue = currentTrack ? [currentTrack, ...remaining] : remaining;
                    newIndex = currentTrack ? 0 : -1;
                    setIsShuffle(true);
                } else {
                    newQueue = [...originalQueue];
                    const currentTrack = playbackQueue[currentTrackIndex];
                    if (currentTrack) {
                        const idx = newQueue.findIndex(t => t.id === currentTrack.id);
                        newIndex = idx !== -1 ? idx : 0;
                    }
                    setIsShuffle(false);
                }

                setPlaybackQueue(newQueue);
                setCurrentTrackIndex(newIndex);
            };

            const toggleRepeat = () => {
                const modes = ['off', 'all', 'one'];
                setRepeatMode(prev => modes[(modes.indexOf(prev) + 1) % modes.length]);
            };

            const handleDeviceSelect = async () => {
                try {
                    const device = await navigator.mediaDevices.selectAudioOutput();
                    setAudioDeviceId(device.deviceId);
                    window.StorageApi.setSetting('audioDeviceId', device.deviceId);
                } catch (err) {
                    console.warn('Device selection cancelled or not supported', err);
                }
            };

            const parseLrc = (lrcString) => {
                const lines = lrcString.split('\n');
                const result = [];
                const timeExp = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/g;
                lines.forEach(line => {
                    let match;
                    const times = [];
                    // Extract all timestamps in the line
                    while ((match = timeExp.exec(line)) !== null) {
                        const min = parseInt(match[1], 10);
                        const sec = parseInt(match[2], 10);
                        const ms = parseInt(match[3], 10);
                        const time = min * 60 + sec + (ms / (match[3].length === 2 ? 100 : 1000));
                        times.push(time);
                    }
                    // The text is the line with all timestamps removed
                    const text = line.replace(/\[\d{2}:\d{2}\.\d{2,3}\]/g, '').trim();
                    if (text && times.length > 0) {
                        times.forEach(t => result.push({ time: t, text }));
                    }
                });
                // Sort by time just in case multiple tags were out of order
                return result.sort((a, b) => a.time - b.time);
            };

            const loadLyrics = async (artist, title, album, duration) => {
                if (!artist || !title) return;
                setLyricsLoading(true);
                setLyricsError(null);
                setLyricsData(null);
                try {
                    // Clean title for better search accuracy
                    let cleanTitle = title.replace(/\(official.*\)/i, '').replace(/\[.*\]/i, '').replace(/\(lyrics.*\)/i, '').replace(/\(audio\)/i, '').trim();

                    // First try Lrclib exactly for speed
                    let lrclibData = null;
                    if (duration) {
                        try {
                            const res = await fetch(`https://lrclib.net/api/get?track_name=${encodeURIComponent(cleanTitle)}&artist_name=${encodeURIComponent(artist)}&album_name=${encodeURIComponent(album !== 'Unknown Album' ? album : '')}&duration=${Math.round(duration)}`);
                            if (res.ok) {
                                const data = await res.json();
                                if (data.syncedLyrics) lrclibData = data.syncedLyrics;
                                else if (data.plainLyrics) lrclibData = data.plainLyrics;
                            }
                        } catch (e) { }
                    }

                    // If lrclib fails, try our massive backend crawler
                    if (!lrclibData) {
                        const localRes = await fetch('/api/lyrics', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ artist, title: cleanTitle })
                        });
                        if (localRes.ok) {
                            const data = await localRes.json();
                            if (data.status === 'success' && data.lyrics) {
                                lrclibData = data.lyrics; // Backend returns raw LRC string
                            }
                        }
                    }

                    // Parse and Set
                    if (lrclibData) {
                        // If it contains brackets with numbers like [00:12.34], it's synced
                        const timeExp = /\[\d{2}:\d{2}\.\d{2,3}\]/;
                        if (timeExp.test(lrclibData)) {
                            setLyricsData(parseLrc(lrclibData));
                        } else {
                            // Split plain lyrics into lines with time = -1
                            const lines = lrclibData.split('\n').map(l => l.trim()).filter(l => l);
                            setLyricsData(lines.map(text => ({ time: -1, text })));
                        }
                    } else {
                        setLyricsError('We scoured the web, but no lyrics were found for this track.');
                    }
                } catch (e) {
                    setLyricsError('Network error while searching for lyrics.');
                } finally {
                    setLyricsLoading(false);
                }
            };

            const nextTrack = useCallback((isAutoNext = false) => {
                if (playbackQueue.length === 0) return;
                let nextIdx;
                if (repeatMode === 'one' && isAutoNext) {
                    nextIdx = currentTrackIndex;
                } else {
                    nextIdx = (currentTrackIndex + 1) % playbackQueue.length;
                }
                const track = playbackQueue[nextIdx];
                setCurrentTrackIndex(nextIdx);
                setIsPlaying(true);
                if (track) playTrackCore(track);
            }, [playbackQueue, currentTrackIndex, repeatMode, playTrackCore]);

            const prevTrack = useCallback(() => {
                if (playbackQueue.length === 0) return;
                const prevIdx = currentTrackIndex > 0 ? currentTrackIndex - 1 : playbackQueue.length - 1;
                const track = playbackQueue[prevIdx];
                setCurrentTrackIndex(prevIdx);
                setIsPlaying(true);
                if (track) playTrackCore(track);
            }, [playbackQueue, currentTrackIndex, playTrackCore]);

            const selectTrack = (index, fromLibrary = false) => {
                let track;
                let queueIndex;
                if (fromLibrary) {
                    track = library[index];
                    const idxInQueue = playbackQueue.findIndex(t => t.id === track.id);
                    if (idxInQueue !== -1) {
                        queueIndex = idxInQueue;
                    } else {
                        const newQueue = [...playbackQueue, track];
                        setPlaybackQueue(newQueue);
                        setOriginalQueue(newQueue);
                        queueIndex = newQueue.length - 1;
                    }
                } else {
                    queueIndex = index;
                    track = playbackQueue[index];
                }
                if (!track) return;
                if (queueIndex === currentTrackIndex && isPlaying) {
                    // Clicking the same song while playing = pause
                    togglePlay();
                    return;
                }
                setCurrentTrackIndex(queueIndex);
                setIsPlaying(true);
                playTrackCore(track);
            };

            const togglePlay = () => {
                const audio = audioTagRef.current;

                if (!audio) return;

                // Ensure AudioContext is init'd once on first user gesture
                if (!audioContextRef.current) {
                    initAudioEngine();
                } else if (audioContextRef.current.state === 'suspended') {
                    audioContextRef.current.resume().catch(() => { });
                }

                if (isPlaying) {
                    audio.pause();
                    setIsPlaying(false);
                    if (reqAnimFrameRef.current) cancelAnimationFrame(reqAnimFrameRef.current);
                } else {
                    if (activeTrack && audio.src) {
                        // Resume existing track
                        audio.play().then(() => {
                            setIsPlaying(true);
                            startProgressLoop();
                        }).catch(() => { });
                    } else if (playbackQueue.length > 0 && currentTrackIndex >= 0) {
                        // No active track yet — load and play
                        playTrackCore(playbackQueue[currentTrackIndex]);
                    } else if (playbackQueue.length > 0) {
                        setCurrentTrackIndex(0);
                        setIsPlaying(true);
                    }
                }
            };

            const startProgressLoop = () => {
                if (reqAnimFrameRef.current) cancelAnimationFrame(reqAnimFrameRef.current);

                const update = () => {
                    if (audioTagRef.current && isPlaying) {
                        const current = audioTagRef.current.currentTime;
                        const dur = audioTagRef.current.duration;

                        // Sync Ref for Seek and Lyrics
                        currentProgressRef.current = current;

                        // INP Byass: DOM Manipulation
                        if (dur > 0) {
                            const perc = (current / dur) * 100;

                            if (uiProgressInputRef.current) {
                                uiProgressInputRef.current.value = current;
                                uiProgressInputRef.current.style.background = `linear-gradient(to right, var(--color-vibrant, var(--color-blurple)) ${perc}%, var(--color-tertiary) ${perc}%)`;
                            }

                            if (uiCurrentTimeTextRef.current) {
                                uiCurrentTimeTextRef.current.textContent = formatTime(current);
                            }

                            // Update active row visualizers natively
                            const listActiveRow = document.getElementById('active-row-bg-list');
                            if (listActiveRow) listActiveRow.style.background = `linear-gradient(to right, var(--color-vibrant-dark) 0%, var(--color-vibrant-dark) ${perc}%, transparent ${perc}%, transparent 100%)`;

                            const queueActiveRow = document.getElementById('active-row-bg-queue');
                            if (queueActiveRow) queueActiveRow.style.background = `linear-gradient(to right, var(--color-vibrant-dark) 0%, var(--color-vibrant-dark) ${perc}%, transparent ${perc}%, transparent 100%)`;

                            // Karaoke Lyrics Sync (Runs perfectly at 60fps)
                            if (lyricsDataRef.current && lyricsContainerRef.current) {
                                const lData = lyricsDataRef.current;
                                if (lData.length > 0 && lData[0].time !== -1) {
                                    let actIdx = -1;
                                    for (let i = 0; i < lData.length; i++) {
                                        if (current >= lData[i].time) actIdx = i;
                                        else break;
                                    }

                                    if (actIdx !== -1) {
                                        const cLyric = lData[actIdx];
                                        const nLyric = lData[actIdx + 1];
                                        const nextTime = nLyric ? nLyric.time : cLyric.time + 4;
                                        const duration = nextTime - cLyric.time;
                                        // Calculate progress specifically for this line
                                        let lineProg = Math.max(0, Math.min(100, ((current - cLyric.time) / duration) * 100));

                                        const children = lyricsContainerRef.current.children;
                                        for (let i = 0; i < lData.length; i++) {
                                            const el = children[i + 1];
                                            if (!el) continue;

                                            if (i === actIdx) {
                                                if (!el.classList.contains('active-lyric-line')) {
                                                    el.classList.add('active-lyric-line');
                                                    el.classList.remove('inactive-lyric-line');
                                                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                                }
                                                el.style.setProperty('--karaoke-fill', `${lineProg}%`);
                                            } else {
                                                if (el.classList.contains('active-lyric-line')) {
                                                    el.classList.remove('active-lyric-line');
                                                    el.classList.add('inactive-lyric-line');
                                                }
                                                el.style.removeProperty('--karaoke-fill');
                                            }
                                        }
                                    }
                                }
                            }

                            // Beat-Sync Dynamic Visualizer Engine
                            if (analyserRef.current) {
                                const dataArray = new Uint8Array(analyserRef.current.frequencyBinCount);
                                analyserRef.current.getByteFrequencyData(dataArray);
                                // Average the sub-bass / kick frequency bins
                                let sum = 0;
                                const bassBins = 8;
                                for (let i = 0; i < bassBins; i++) sum += dataArray[i];
                                const avgBass = sum / bassBins;

                                // Map intensity smoothly: Threshold 160 out of 255
                                const intensity = Math.max(0, (avgBass - 160) / 95);
                                const scale = 1.0 + (intensity * 0.15); // Default active scale is 1.0, jump up to 1.15 on beat for massive pulse
                                const brightness = 1.0 + (intensity * 1.5); // Brightness peaks heavily
                                const pulseOpacity = 0.5 + (intensity * 0.8);

                                document.documentElement.style.setProperty('--beat-scale', scale);
                                document.documentElement.style.setProperty('--beat-bright', brightness);
                                document.documentElement.style.setProperty('--beat-opacity', pulseOpacity);
                            }

                            // Re-sync React State periodically for Lyrics Engine (Throttled to run only when lyrics map changes)
                            setCurrentTime(prev => {
                                // Only trigger re-render if we jump more than 100ms
                                if (Math.abs(prev - current) > 0.1) return current;
                                return prev;
                            });
                        }

                        if (dur > 0 && !hasLoggedPlayRef.current && current > (dur * 0.5)) {
                            hasLoggedPlayRef.current = true;
                            const track = playbackQueue[currentTrackIndex];
                            if (track) window.StorageApi.logPlay(track.artist, dur / 60, track.id);
                        }
                    }
                    reqAnimFrameRef.current = requestAnimationFrame(update);
                };
                reqAnimFrameRef.current = requestAnimationFrame(update);
            };

            const playTrackCore = (track) => {
                if (!track) return;

                // Resume AudioContext if suspended (after user interaction) — only if already initialized
                if (audioContextRef.current && audioContextRef.current.state === 'suspended') {
                    audioContextRef.current.resume().catch(() => { });
                }
                setIsLoading(true);
                setPlaybackError(null);

                // Always resolve audio element fresh — React ref may not be set if initAudioEngine wasn't called
                const audio = audioTagRef.current || document.getElementById('engine-audio-tag');
                if (!audio) {
                    console.error('[playTrackCore] Audio element not found in DOM');
                    setIsLoading(false);
                    return;
                }
                audioTagRef.current = audio;

                const filePath = track.filePath || track.file_path || track.fileName;

                if (!filePath) {
                    setPlaybackError(`No se encontró la ruta para: ${track.title}`);
                    setIsLoading(false);
                    return;
                }

                // Clean up previous playback
                audio.pause();
                audio.oncanplay = null;
                audio.onloadedmetadata = null;
                audio.onended = null;
                audio.onerror = null;
                audio.src = '';
                audio.load();

                // Set new source
                audio.src = `/api/file?path=${encodeURIComponent(filePath)}`;

                // Update duration when metadata arrives
                audio.onloadedmetadata = () => {
                    setDuration(audio.duration);
                    durationRef.current = audio.duration;
                    if (!track.duration || track.duration === 0) {
                        window.StorageApi.updateTrack(track.id, { duration: audio.duration });
                    }

                // Wait for canplay — then start
                audio.oncanplay = () => {
                    audio.oncanplay = null; // fire only once
                    audio.play().then(() => {
                        setIsPlaying(true);
                        setIsLoading(false);
                        setActiveTrack(track);
                        hasLoggedPlayRef.current = false;
                        startProgressLoop();
                        if (view === 'lyrics') {
                            loadLyrics(track.artist, track.title, track.album, track.duration);
                        } else {
                            setLyricsData(null);
                        }
                    }).catch((e) => {
                        setPlaybackError(`No se pudo reproducir: ${e.message}`);
                        setIsPlaying(false);
                        setIsLoading(false);
                    });
                };

                // Auto-advance when track ends
                audio.onended = () => {
                    if (repeatMode === 'one') {
                        audio.currentTime = 0;
                        audio.play();
                    } else {
                        nextTrack(true);
                    }
                };

                // Error
                audio.onerror = () => {
                    const err = audio.error;
                    setPlaybackError(`Error al reproducir "${track.title}": ${err?.message || 'archivo no soportado'}`);
                    setIsLoading(false);
                    setIsPlaying(false);
                };

                // Kick off loading
                audio.load();

            useEffect(() => {
                // Nothing to do here - playback is triggered directly in selectTrack/nextTrack/prevTrack
            }, [currentTrackIndex]);

                        const img = new Image();
                        img.crossOrigin = 'Anonymous';
                        img.src = activeTrack.coverUrl;
                        img.onload = () => {
                            const colorThief = new ColorThief();
                            const color = colorThief.getColor(img);
                            if (color) {
                                const rgbStr = `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
                                const rgbaStr = `rgba(${color[0]}, ${color[1]}, ${color[2]}, 0.15)`;
                                document.documentElement.style.setProperty('--color-vibrant', rgbStr);
                                document.documentElement.style.setProperty('--color-vibrant-dark', rgbaStr);
                            }
                        };

                } else {

                        const res = await fetch('/api/version', { method: 'POST' });
                        const data = await res.json();
                        if (data.version && data.version !== CURRENT_VERSION) {

                        }
                    } catch (e) {

                    }
                };
                checkVersion();
                const timer = setInterval(checkVersion, 300000); // Check every 5 mins
                return () => clearInterval(timer);

            // Lyrics React Sync Removed - Now fully handled in 60fps requestAnimationFrame loop

            const handleSeek = (e) => {
